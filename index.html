<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Ludo - 3 Player</title>
    <style>
        :root {
            --p1-color: #ff4757; /* Red */
            --p2-color: #2ed573; /* Green */
            --p3-color: #eccc68; /* Yellow */
            --bg-color: #1e272e;
            --board-bg: #f1f2f6;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-color); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        /* LOBBY UI */
        #lobby { display: flex; flex-direction: column; gap: 20px; text-align: center; background: #2f3640; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; }
        input, button { padding: 15px; font-size: 1.2rem; border-radius: 8px; border: none; outline: none; }
        button { background: #3742fa; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .error { color: #ff4757; font-size: 0.9rem; }

        /* GAME UI */
        #game { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; padding: 10px; }
        
        .header { display: flex; justify-content: space-between; width: 100%; margin-bottom: 20px; background: #2f3640; padding: 15px; border-radius: 10px; }
        .players-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: #333; }
        .badge.p1 { background: var(--p1-color); }
        .badge.p2 { background: var(--p2-color); }
        .badge.p3 { background: var(--p3-color); }
        
        /* BOARD */
        .board-container { position: relative; width: 350px; height: 350px; background: var(--board-bg); border-radius: 15px; border: 8px solid #333; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        
        /* Homes */
        .home { position: absolute; width: 100px; height: 100px; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; padding: 15px; }
        .home.p1 { bottom: 20px; left: 20px; background: rgba(255, 71, 87, 0.2); border: 2px solid var(--p1-color); }
        .home.p2 { top: 20px; left: 20px; background: rgba(46, 213, 115, 0.2); border: 2px solid var(--p2-color); }
        .home.p3 { top: 20px; right: 20px; background: rgba(236, 204, 104, 0.2); border: 2px solid var(--p3-color); }
        
        .home-spot { width: 100%; height: 100%; border-radius: 50%; background: rgba(0,0,0,0.1); border: 2px dashed rgba(0,0,0,0.2); }

        /* Track */
        .track { position: absolute; top: 130px; left: 15px; width: 300px; height: 90px; border: 2px solid #ccc; display: flex; flex-wrap: wrap; }
        /* Simplification for UI: We abstract the track as a circle visually, but programmatically map pieces */
        #track-svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        /* Pieces */
        .piece { position: absolute; width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5); cursor: pointer; transition: all 0.3s ease; z-index: 10; transform: translate(-50%, -50%); }
        .piece.p1 { background: var(--p1-color); }
        .piece.p2 { background: var(--p2-color); }
        .piece.p3 { background: var(--p3-color); }
        
        /* Controls */
        .controls { display: flex; flex-direction: column; align-items: center; margin-top: 20px; width: 100%; gap: 15px; background: #2f3640; padding: 20px; border-radius: 10px; }
        #diceBtn { font-size: 1.5rem; padding: 15px 30px; border-radius: 50px; }
        #diceBtn:disabled { background: #747d8c; cursor: not-allowed; }
        .dice-display { font-size: 3rem; font-weight: bold; color: white; background: #333; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; border-radius: 10px; border: 2px solid #555; }
        
        .status-text { font-size: 1.1rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="lobby">
        <h2>🔥 3-Player Ludo 🔥</h2>
        <div class="error" id="lobbyError"></div>
        <button id="createRoomBtn">Create New Room</button>
        <p>OR</p>
        <input type="text" id="roomInput" placeholder="Enter Room ID" autocomplete="off" maxlength="6">
        <button id="joinRoomBtn">Join Room</button>
    </div>

    <div id="game">
        <div class="header">
            <div>Room: <strong id="roomDisplay">---</strong></div>
            <div class="players-list" id="playersList"></div>
        </div>

        <div class="board-container" id="board">
            <svg id="track-svg"></svg>
            
            <div class="home p1" id="home-p1"></div>
            <div class="home p2" id="home-p2"></div>
            <div class="home p3" id="home-p3"></div>
            </div>

        <div class="controls">
            <div class="status-text" id="turnDisplay">Waiting for players...</div>
            <div class="dice-display" id="diceValue">-</div>
            <button id="diceBtn" disabled>Roll Dice</button>
            <div class="status-text" id="actionPrompt"></div>
        </div>
    </div>

    <script type="module">
        // Using standard Firebase v10 CDN compatible with your config
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0PAbbgdoW0AncKtvnCHHsr3J0-Meu5HM",
            authDomain: "ludoooooo-df615.firebaseapp.com",
            databaseURL: "https://ludoooooo-df615-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ludoooooo-df615",
            storageBucket: "ludoooooo-df615.firebasestorage.app",
            messagingSenderId: "502183247328",
            appId: "1:502183247328:web:d2db4c226fedc34ac2ff85"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // State Variables
        let userUid = null;
        let currentRoom = null;
        let myRole = null; // p1, p2, or p3
        let localState = null;
        let hasRolledThisTurn = false;

        // Path logic (Simplified Circular Track layout around the center)
        const pathCoords = [];
        const centerX = 175, centerY = 175, radius = 110;
        for (let i = 0; i < 52; i++) {
            const angle = (i / 52) * Math.PI * 2 - Math.PI / 2;
            pathCoords[i + 1] = { 
                x: centerX + radius * Math.cos(angle), 
                y: centerY + radius * Math.sin(angle) 
            };
        }

        // Draw track visually
        const svg = document.getElementById('track-svg');
        for(let i = 1; i <= 52; i++) {
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', pathCoords[i].x);
            circle.setAttribute('cy', pathCoords[i].y);
            circle.setAttribute('r', '8');
            circle.setAttribute('fill', i === 1 ? 'var(--p1-color)' : (i === 18 ? 'var(--p2-color)' : (i === 35 ? 'var(--p3-color)' : 'white')));
            circle.setAttribute('stroke', '#ccc');
            svg.appendChild(circle);
        }

        // Init App
        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUid = user.uid;
                document.getElementById('createRoomBtn').disabled = false;
                document.getElementById('joinRoomBtn').disabled = false;
            } else {
                signInAnonymously(auth).catch(e => showError(e.message));
            }
        });

        // DOM Elements
        const lobbyEl = document.getElementById('lobby');
        const gameEl = document.getElementById('game');
        const errorEl = document.getElementById('lobbyError');
        const roomInput = document.getElementById('roomInput');
        const diceBtn = document.getElementById('diceBtn');

        // Event Listeners
        document.getElementById('createRoomBtn').onclick = createRoom;
        document.getElementById('joinRoomBtn').onclick = () => joinRoom(roomInput.value.toUpperCase());
        diceBtn.onclick = rollDice;

        function showError(msg) {
            errorEl.innerText = msg;
            setTimeout(() => errorEl.innerText = '', 3000);
        }

        function generateRoomId() {
            return Math.random().toString(36).substring(2, 7).toUpperCase();
        }

        async function createRoom() {
            const roomId = generateRoomId();
            const roomRef = ref(db, `rooms/${roomId}`);
            
            const initialData = {
                players: { [userUid]: "p1" },
                gameState: {
                    status: "waiting",
                    turn: "p1",
                    dice: { value: 0, lastRolledBy: "" },
                    pieces: {
                        p1: [0, 0, 0, 0],
                        p2: [0, 0, 0, 0],
                        p3: [0, 0, 0, 0]
                    },
                    version: 1
                }
            };

            await set(roomRef, initialData);
            myRole = "p1";
            enterGame(roomId);
        }

        async function joinRoom(roomId) {
            if (!roomId) return showError("Enter a Room ID");
            const roomRef = ref(db, `rooms/${roomId}`);
            const snapshot = await get(roomRef);

            if (!snapshot.exists()) return showError("Room not found!");
            
            const data = snapshot.val();
            const players = data.players || {};
            
            if (players[userUid]) {
                myRole = players[userUid]; // Reconnecting
            } else {
                const playerCount = Object.keys(players).length;
                if (playerCount >= 3) return showError("Room is full!");
                
                myRole = !Object.values(players).includes("p2") ? "p2" : "p3";
                await update(ref(db, `rooms/${roomId}/players`), { [userUid]: myRole });
                
                if (playerCount === 2) { // Making it 3 players total now
                    await update(ref(db, `rooms/${roomId}/gameState`), { status: "playing" });
                }
            }
            enterGame(roomId);
        }

        function enterGame(roomId) {
            currentRoom = roomId;
            lobbyEl.style.display = 'none';
            gameEl.style.display = 'flex';
            document.getElementById('roomDisplay').innerText = roomId;
            
            // Listen to Firebase DB
            onValue(ref(db, `rooms/${roomId}/gameState`), (snapshot) => {
                const state = snapshot.val();
                if (state) updateLocalGame(state);
            });
            
            onValue(ref(db, `rooms/${roomId}/players`), (snapshot) => {
                const players = snapshot.val();
                if (players) updatePlayerList(players);
            });
        }

        function updatePlayerList(players) {
            const list = document.getElementById('playersList');
            list.innerHTML = '';
            for (let uid in players) {
                const role = players[uid];
                const span = document.createElement('span');
                span.className = `badge ${role}`;
                span.innerText = `${role.toUpperCase()} ${uid === userUid ? '(You)' : ''}`;
                list.appendChild(span);
            }
        }

        function updateLocalGame(state) {
            localState = state;
            
            // UI Updates
            document.getElementById('diceValue').innerText = state.dice.value > 0 ? state.dice.value : '-';
            
            const isMyTurn = (state.turn === myRole);
            const isPlaying = (state.status === "playing");
            
            if (!isPlaying) {
                document.getElementById('turnDisplay').innerText = "Waiting for 3 players...";
                diceBtn.disabled = true;
            } else {
                document.getElementById('turnDisplay').innerText = isMyTurn ? "Your Turn!" : `${state.turn.toUpperCase()}'s Turn`;
                
                // Strict Turn Control UI
                if (isMyTurn) {
                    if (state.dice.lastRolledBy === myRole) {
                        diceBtn.disabled = true;
                        hasRolledThisTurn = true;
                        document.getElementById('actionPrompt').innerText = "Move a piece!";
                    } else {
                        diceBtn.disabled = false;
                        hasRolledThisTurn = false;
                        document.getElementById('actionPrompt').innerText = "Roll the dice!";
                    }
                } else {
                    diceBtn.disabled = true;
                    document.getElementById('actionPrompt').innerText = "";
                }
            }

            renderPieces(state.pieces);
        }

        async function rollDice() {
            if (!localState || localState.turn !== myRole || hasRolledThisTurn) return;
            
            const roll = Math.floor(Math.random() * 6) + 1;
            
            // Use Firebase Transaction to prevent race conditions
            const stateRef = ref(db, `rooms/${currentRoom}/gameState`);
            await runTransaction(stateRef, (state) => {
                if (state && state.turn === myRole && state.dice.lastRolledBy !== myRole) {
                    state.dice.value = roll;
                    state.dice.lastRolledBy = myRole;
                    state.version++;
                }
                return state;
            });
        }

        function renderPieces(piecesObj) {
            // Remove old pieces
            document.querySelectorAll('.piece').forEach(p => p.remove());
            
            // Config Start/Home offsets
            const offsets = { p1: 1, p2: 18, p3: 35 };

            for (const player in piecesObj) {
                piecesObj[player].forEach((pos, index) => {
                    const el = document.createElement('div');
                    el.className = `piece ${player}`;
                    
                    if (pos === 0) {
                        // In Base
                        const homeSpots = document.querySelectorAll(`.home.${player} .home-spot`);
                        if(homeSpots.length === 0) {
                            // generate home spots if missing
                            const homeBox = document.getElementById(`home-${player}`);
                            for(let i=0; i<4; i++) {
                                let spot = document.createElement('div');
                                spot.className = 'home-spot';
                                homeBox.appendChild(spot);
                            }
                        }
                        const homeSpotsUpdated = document.querySelectorAll(`.home.${player} .home-spot`);
                        const rect = homeSpotsUpdated[index].getBoundingClientRect();
                        const boardRect = document.getElementById('board').getBoundingClientRect();
                        el.style.left = `${rect.left - boardRect.left + rect.width/2}px`;
                        el.style.top = `${rect.top - boardRect.top + rect.height/2}px`;
                    } else {
                        // On Track - calculate absolute position relative to start
                        let absolutePos = (pos + offsets[player] - 1);
                        if (absolutePos > 52) absolutePos -= 52;
                        
                        const coords = pathCoords[absolutePos];
                        el.style.left = `${coords.x}px`;
                        el.style.top = `${coords.y}px`;
                    }

                    // Click to move
                    if (player === myRole) {
                        el.onclick = () => attemptMove(index, pos);
                    }
                    
                    document.getElementById('board').appendChild(el);
                });
            }
        }

        async function attemptMove(pieceIndex, currentPos) {
            if (!localState || localState.turn !== myRole || localState.dice.lastRolledBy !== myRole) return;
            
            const diceVal = localState.dice.value;
            let newPos = currentPos;

            if (currentPos === 0) {
                if (diceVal === 6) newPos = 1; // Need 6 to exit home
                else return; // Ignore click if not 6 and in home
            } else {
                newPos = currentPos + diceVal;
                if (newPos > 52) return; // Simplified: block overshooting finish
            }

            // Anti-cheat via Transaction
            const stateRef = ref(db, `rooms/${currentRoom}/gameState`);
            await runTransaction(stateRef, (state) => {
                // Version and turn check
                if (state && state.turn === myRole && state.dice.lastRolledBy === myRole && state.version === localState.version) {
                    
                    state.pieces[myRole][pieceIndex] = newPos;
                    
                    // Basic capture logic (send others home if same spot)
                    // Convert relative pos to absolute to check collisions
                    const offsets = { p1: 1, p2: 18, p3: 35 };
                    let myAbsolute = (newPos + offsets[myRole] - 1);
                    if(myAbsolute > 52) myAbsolute -= 52;

                    for(let other in state.pieces) {
                        if(other !== myRole) {
                            for(let i=0; i<4; i++) {
                                let otherPos = state.pieces[other][i];
                                if(otherPos > 0) {
                                    let otherAbsolute = (otherPos + offsets[other] - 1);
                                    if(otherAbsolute > 52) otherAbsolute -= 52;
                                    
                                    if(myAbsolute === otherAbsolute) {
                                        // Captured! Send home
                                        state.pieces[other][i] = 0;
                                    }
                                }
                            }
                        }
                    }

                    // Next Turn Calculation
                    state.turn = (myRole === "p1") ? "p2" : ((myRole === "p2") ? "p3" : "p1");
                    state.dice.lastRolledBy = ""; // Reset roll tracker
                    state.version++;
                }
                return state;
            });
        }
    </script>
</body>
</html>
